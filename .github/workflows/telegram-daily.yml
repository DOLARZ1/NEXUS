name: Recordatorio diario por Telegram (6am MX)

on:
  schedule:
    # 12:00 UTC = 6:00 AM hora México (UTC-6)
    - cron: '0 12 * * *'
  workflow_dispatch: # permite ejecutarlo manualmente para probar

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Leer estado y enviar resumen
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NEXUS_PAT: ${{ secrets.NEXUS_PAT }}
        run: |
          # Descargar el estado guardado por la app (data/state.json)
          STATE_URL="https://raw.githubusercontent.com/DOLARZ1/NEXUS/main/data/state.json"
          HTTP_CODE=$(curl -s -o state.json -w "%{http_code}" -H "Authorization: token $NEXUS_PAT" "$STATE_URL")
          
          if [ "$HTTP_CODE" != "200" ]; then
            # Si no hay state.json, enviar recordatorio genérico
            MSG="🌅 *Buenos días desde NEXUS*%0A%0ANo encontré tu estado sincronizado. Abre la app y toca 📨 para sincronizar.%0A%0A🔗 https://dolarz1.github.io/NEXUS/"
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}" \
              -d "text=${MSG}" \
              -d "parse_mode=Markdown"
            exit 0
          fi
          
          # Generar el resumen con Node.js
          node .github/scripts/generate-summary.js

      - name: Verificar envío
        run: echo "Recordatorio enviado correctamente"
